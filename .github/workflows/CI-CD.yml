name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project
        run: mvn clean package
  # Quét lỗi logic SAST 
    # sử dụng SportBugs  
      - name: Run SpotBugs 
        run: mvn spotbugs:spotbugs
    # sử dụng SonarQube
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
  # Quét lỗi các thư viện mã nguồn mở có lổ hổng SCA
    # sử dụng Snyk
      #Tạo cache file phân tích để giảm thời gian quét
      - name: Install Snyk
        run: npm install -g snyk

      - name: Snyk Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=pom.xml

      - name: Monitor Project
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --file=pom.xml
      - name: Build and analyze with Maven
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Mở comment dòng này NẾU bạn dùng SonarQube tự cài đặt (On-premise)
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          
      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: target/*.war



  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/website:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/website:latest

  deploy:
    needs: docker
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Runner
        run: |
          whoami
          hostname
          kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/website-deployment -n website
          kubectl rollout status deployment/website-deployment -n website